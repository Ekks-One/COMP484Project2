<!DOCTYPE html>
<html>
  <head>
    <title>Train Your Pokemon!</title>
    <meta name="description" content="A cool thing made with Glitch">
    <link id="favicon" rel="icon" href="https://glitch.com/edit/favicon-app.ico" type="image/x-icon">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <header>
      <h1>
        PokePet Trainer
      </h1>
    </header>

    <main>
      <!-- Pet Image Container -->
      <section class="pet-image-container">

        <!-- Background Image -->
        <div style="background-image: url('./images/background.jpg')">
          <!-- Pet Image -->
          <img class="pet-image" src="./images/TurtwigWalk.png">
        </div>
      </section>

      <!-- Popup -->
      <div id="popupOverlay" class="overlay">
        <div class="popup-box">
          <h1>Enter Name</h1>
          <div id="nameError" class="error"></div>
          <input type="text" id="myInput" placeholder="Name your Pokemon">
          <div class="buttons">
            <button onclick="submitInput()">Submit</button>
          </div>
        </div>
      </div>

      <!-- Main Controls -->
      <div class="main-controls">
        <section class="dashboard hidden">
          <div>Name: <strong><span class="name"></span></strong></div>
          <div>Weight: <strong><span class="weight"></span> pounds</strong></div>
          <div>Happiness: <strong><span class="happiness"></span> tail wags (per min)</strong></div>
          <div>IQ: <strong><span class="iq"></span></strong></div>
          <div class="button-container">
            <!-- Treat Button -->
            <button class="treat-button">
              Treat
            </button>

            <!-- Play Button -->
            <button class="play-button">
              Play
            </button>

            <!-- Exercise Button -->
            <button class="exercise-button">
              Exercise
            </button>

            <!-- Study Button -->
            <button class="study-button">
              Study
            </button>

            <!-- Doom Scroll Button -->
            <button class="doom-scroll-button">
              Doom Scroll
            </button>

          </div>
        </section>

        <!--Pokeball -->
        <button id="pokeball" onclick="throwPokeball()"></button>

        <!-- Status Log -->
        <div class="status-container">
          <h3>Activity Log</h3>
          <div id="status-log"></div>
        </div>

      </div>
    </main>

    <!-- Your web-app is https, so your scripts need to be too -->
    <script src="https://code.jquery.com/jquery-2.2.1.min.js"
            integrity="sha256-gvQgAFzTH6trSrAWoH1iPo9Xc96QxSZ3feW6kem+O00="
            crossorigin="anonymous">
    </script>
  </body>
</html>
